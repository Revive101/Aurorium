[package]
name = "aurorium"
authors = ["Phill030"]
version = "2.1.2"
edition = "2024"

[dependencies]
axum = "0.8.1"
axum-extra = { version = "0.10.0", features = ["typed-header"] }
chrono = "0.4.39"
clap = { version = "4.5.30", features = ["derive"] }
env_logger = "0.11.6"
futures = "0.3.31"
regex = "1.11.1"
reqwest = "0.12.12"
log = "0.4.26"
quick-xml = { version = "0.31.0", features = ["serialize"] }
quickxml_to_serde = { version = "0.6.0", features = ["json_types"] }
serde = { version = "1.0.218", features = ["derive"] }
serde_json = "1.0.139"
tokio = { version = "1.43.0", features = ["full"] }
tower = { version = "0.5.2", features = ["limit", "buffer", "timeout"] }
anyhow = "1.0.96"
async-trait = "0.1.86"
thiserror = "2.0.11"
lazy_static = "1.5.0"
tokio-util = { version = "0.7.13", features = ["io-util"] }
