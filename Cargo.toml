[package]
name = "aurorium"
authors = ["Phill030"]
version = "2.1.2"
edition = "2024"

[dependencies]
axum = "0.8.1"
axum-extra = { version = "0.10.0", features = ["typed-header"] }
bpaf = "0.9.16"
chrono = "0.4.39"
console = "0.15.10"
env_logger = "0.11.6"
futures = "0.3.31"
lazy_static = "1.5.0"
log = "0.4.26"
quick-xml = { version = "0.31.0", features = ["serialize"] }
quickxml_to_serde = { version = "0.6.0", features = ["json_types"] }
regex = "1.11.1"
reqwest = "0.12.12"
serde = { version = "1.0.218", features = ["derive"] }
serde_json = "1.0.139"
thiserror = "2.0.11"
tokio-util = { version = "0.7.13", features = ["io-util", "rt"] }
tokio = { version = "1.43.0", features = ["full"] }
async-trait = "0.1.86"
anyhow = "1.0.96"
